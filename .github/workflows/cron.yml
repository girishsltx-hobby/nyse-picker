name: Fetch Market Data

on:
  schedule:
    - cron: '* 8-5 * * *'   # every 1 minute between 8am and 5pm
  workflow_dispatch:          # manual trigger too

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fetch cycle
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://nyse-picker-007.vercel.app/_/backend/api/cron/fetch-data